{% extends "viewer/base.html" %}
{% load static %}
{% block content %}
<style>
  /* Heq çdo background të base.html */
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    position: relative;
    min-height: 100vh;
    background: none !important; /* ky !important e mbishkruan çdo background tjetër */
  }

  /* Vetëm sfondi me films.jpg */
.page-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("{% static 'viewer/images/films.jpg' %}") no-repeat center center;
    background-size: cover;
    z-index: -2; /* poshtë overlay dhe form-container */
}

/* Overlay e kuqe mbi sfond */
.page-background::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(204, 0, 0, 0.15); /* e kuqe e lehtë, mund të ndryshosh 0.15 */
    z-index: 0;
}

 .form-container {
    width: 800px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 1); /* bardhë plot për formën */
    border-radius: 25px;
    box-shadow: 0 0 25px rgba(255,255,255,0.8), 0 0 25px rgba(204,0,0,0.5); /* bardhë + shadow i kuq ekzistues */
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    z-index: 1;
}

  .form-container:hover {
    transform: scale(1.02);
    box-shadow: 0 0 35px rgba(204,0,0,0.7);
  }

  h2 {
    color: #cc0000;
    margin-bottom: 25px;
    font-size: 32px;
    font-family: 'Lucida Calligraphy', sans-serif;
  }

  h2 img {
    width: 48px;
    height: 48px;
    vertical-align: middle;
    margin-right: 10px;
  }

  form .field-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }

  form .field-row label {
    width: 150px;
    font-weight: normal;
    font-style: italic;
    color: #cc0000;
    text-align: left;
    font-size: 15px;
    margin-right: 10px;
  }

  form .field-row input,
  form .field-row select,
  form .field-row textarea {
    flex: 1;
    padding: 8px 10px;
    border: 2px solid #ffcccc;
    border-radius: 12px;
    outline: none;
    font-size: 15px;
    transition: 0.3s;
  }

  form .field-row input:focus,
  form .field-row select:focus,
  form .field-row textarea:focus {
    border-color: #cc0000;
    box-shadow: 0 0 6px rgba(204,0,0,0.2);
  }

  button {
    background: #cc0000;
    color: white;
    padding: 12px 28px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 17px;
    transition: 0.3s;
  }

  button:hover {
    background: #990000;
    transform: scale(1.05);
  }
</style>

<div class="page-background"></div>

<div class="form-container">
  <h2>
    <img src="{% static 'viewer/images/clapperboard.png' %}" alt="Clapperboard">
    Add Movie
  </h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
      <div class="field-row">
        {{ field.label_tag }} {{ field }}
      </div>
    {% endfor %}
    <button type="submit">Save</button>
  </form>
</div>
{% endblock %}
