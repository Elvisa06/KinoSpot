{% extends "viewer/base.html" %}
{% block content %}
<h2>Filmat e vitit <i>{{ year }}</i> janë:</h2>
{% if movies %}
    <ul>
        {% for movie in movies %}
            <li>{{ movie.title }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>Nuk ka filma te publikuar ne kete vit.</p>
{% endif %}
{% endblock %}
